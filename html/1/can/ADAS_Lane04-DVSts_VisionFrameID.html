<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #chart-container {
      width: 100%;
      height: 100%;
      min-height: 600px;
    }
  </style>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart-container'));
        
        // 设置图表配置项
        const option = {
  "height": "1080px",
  "legend": {
    "data": [
      "ADAS_Lane04-DVSts_VisionFrameID"
    ]
  },
  "xAxis": {
    "type": "time"
  },
  "yAxis": [
    {
      "type": "value",
      "name": "数值"
    }
  ],
  "series": [
    {

        [

          0
        ],
        [
          1766822405131.116,
          239
        ],
        [
          1766822405181.139,
          241
        ],
        [
          1766822405281.033,
          244
        ],
        [

        [

        [

        [

        [
          1766822406180.8938,
          10
        ]
      ],
      "type": "line",
      "smooth": false,
      "yAxisIndex": 0,
      "step": false
    }
  ],
  "tooltip": {
    "trigger": "axis",
    "axisPointer": {
      "type": "cross"
    }
  },
  "dataZoom": [
    {
      "type": "slider",
      "xAxisIndex": 0,
      "show": true,
      "filterMode": "filter"
    }
  ],
  "toolbox": {
    "show": true,
    "feature": {
      "dataZoom": {
        "show": true
      },
      "restore": {},
      "saveAsImage": {}
    }
  }
};
        
        // 应用配置项
        chart.setOption(option);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
