<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #chart-container {
      width: 100%;
      height: 100%;
      min-height: 600px;
    }
  </style>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart-container'));
        
        // 设置图表配置项
        const option = {
  "height": "1080px",
  "legend": {
    "data": [
      "ADAS_Lane05-DVSts_PerceptFrameCounter"
    ]
  },
  "xAxis": {
    "type": "time"
  },
  "yAxis": [
    {
      "type": "value",
      "name": "数值"
    }
  ],
  "series": [
    {
      "name": "ADAS_Lane05-DVSts_PerceptFrameCounter",
      "data": [
        [
          1766821805150.988,
          0
        ],
        [
          1766822405131.1492,
          1479
        ],
        [
          1766822405181.16,
          1481
        ],
        [
          1766822405281.038,
          1483
        ],
        [
          1766822405381.0278,
          1484
        ],
        [
          1766822405481.019,
          1487
        ],
        [
          1766822405581.093,
          1488
        ],
        [
          1766822405681.018,
          1490
        ],
        [
          1766822405780.981,
          1492
        ],
        [
          1766822405880.922,
          1494
        ],
        [
          1766822405981.0122,
          1496
        ],
        [
          1766822406080.975,
          1498
        ]
      ],
      "type": "line",
      "smooth": false,
      "yAxisIndex": 0,
      "step": false
    }
  ],
  "tooltip": {
    "trigger": "axis",
    "axisPointer": {
      "type": "cross"
    }
  },
  "dataZoom": [
    {
      "type": "slider",
      "xAxisIndex": 0,
      "show": true,
      "filterMode": "filter"
    }
  ],
  "toolbox": {
    "show": true,
    "feature": {
      "dataZoom": {
        "show": true
      },
      "restore": {},
      "saveAsImage": {}
    }
  }
};
        
        // 应用配置项
        chart.setOption(option);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
