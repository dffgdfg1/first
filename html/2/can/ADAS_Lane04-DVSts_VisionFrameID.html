<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #chart-container {
      width: 100%;
      height: 100%;
      min-height: 600px;
    }
  </style>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart-container'));
        
        // 设置图表配置项
        const option = {
  "height": "1080px",
  "legend": {
    "data": [
      "ADAS_Lane04-DVSts_VisionFrameID"
    ]
  },
  "xAxis": {
    "type": "time"
  },
  "yAxis": [
    {
      "type": "value",
      "name": "数值"
    }
  ],
  "series": [
    {
      "name": "ADAS_Lane04-DVSts_VisionFrameID",
      "data": [
        [
          1766821805150.9858,
          0
        ],
        [
          1766822405130.111,
          238
        ],
        [
          1766822405180.168,
          240
        ],
        [
          1766822405280.038,
          243
        ],
        [
          1766822405380.0881,
          244
        ],
        [
          1766822405480.0168,
          248
        ],
        [
          1766822405580.061,
          249
        ],
        [
          1766822405680.014,
          252
        ],
        [
          1766822405780.981,
          254
        ],
        [
          1766822405879.958,
          1
        ],
        [
          1766822405979.9011,
          4
        ],
        [
          1766822406079.9329,
          6
        ]
      ],
      "type": "line",
      "smooth": false,
      "yAxisIndex": 0,
      "step": false
    }
  ],
  "tooltip": {
    "trigger": "axis",
    "axisPointer": {
      "type": "cross"
    }
  },
  "dataZoom": [
    {
      "type": "slider",
      "xAxisIndex": 0,
      "show": true,
      "filterMode": "filter"
    }
  ],
  "toolbox": {
    "show": true,
    "feature": {
      "dataZoom": {
        "show": true
      },
      "restore": {},
      "saveAsImage": {}
    }
  }
};
        
        // 应用配置项
        chart.setOption(option);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
