<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #chart-container {
      width: 100%;
      height: 100%;
      min-height: 600px;
    }
  </style>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart-container'));
        
        // 设置图表配置项
        const option = {
  "height": "1080px",
  "legend": {
    "data": [
      "ADAS_Lane05-DVSts_PerceptFrameCounter"
    ]
  },
  "xAxis": {
    "type": "time"
  },
  "yAxis": [
    {
      "type": "value",
      "name": "数值"
    }
  ],
  "series": [
    {
      "name": "ADAS_Lane05-DVSts_PerceptFrameCounter",
      "data": [
        [
          1766821805152.001,
          0
        ],
        [
          1766822405131.24,
          1471
        ],
        [
          1766822405181.299,
          1474
        ],
        [
          1766822405281.07,
          1475
        ],
        [
          1766822405381.064,
          1477
        ],
        [
          1766822405481.0532,
          1479
        ],
        [
          1766822405581.127,
          1481
        ],
        [
          1766822405681.05,
          1483
        ],
        [
          1766822405781.006,
          1485

        [
          1766822405880.9421,
          1487
        ],
        [
          1766822405981.169,
          1489
        ],
        [
          1766822406081.099,
          1491
        ],
        [
          1766822406181.063,
          1493
        ]
      ],
      "type": "line",
      "smooth": false,
      "yAxisIndex": 0,
      "step": false
    }
  ],
  "tooltip": {
    "trigger": "axis",
    "axisPointer": {
      "type": "cross"
    }
  },
  "dataZoom": [
    {
      "type": "slider",
      "xAxisIndex": 0,
      "show": true,
      "filterMode": "filter"
    }
  ],
  "toolbox": {
    "show": true,
    "feature": {
      "dataZoom": {
        "show": true
      },
      "restore": {},
      "saveAsImage": {}
    }
  }
};
        
        // 应用配置项
        chart.setOption(option);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
